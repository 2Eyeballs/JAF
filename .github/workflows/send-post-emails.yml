name: Email new post to subscribers

on:
  push:
    branches: [main]
    paths:
      - 'posts/*.md'
  workflow_dispatch:
    inputs:
      post_file:
        description: 'Post file to send (e.g. posts/2026-05-18-my-post.md)'
        required: true
        type: string

jobs:
  send-emails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find newly added posts
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NEW="${{ github.event.inputs.post_file }}"
          else
            NEW=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'posts/*.md' | tr '\n' ' ')
          fi
          echo "new_posts=$NEW" >> $GITHUB_OUTPUT

      - name: Setup Node
        if: steps.diff.outputs.new_posts != ''
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Send emails
        if: steps.diff.outputs.new_posts != ''
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          for post in ${{ steps.diff.outputs.new_posts }}; do
            echo "Sending email for: $post"
            node scripts/send-post-emails.js "$post"
          done
