name: Email new post to subscribers

on:
  push:
    branches: [main]
    paths:
      - 'posts/*.md'

jobs:
  send-emails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find newly added posts
        id: diff
        run: |
          NEW=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'posts/*.md' | tr '\n' ' ')
          echo "new_posts=$NEW" >> $GITHUB_OUTPUT

      - name: Setup Node
        if: steps.diff.outputs.new_posts != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send emails
        if: steps.diff.outputs.new_posts != ''
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          for post in ${{ steps.diff.outputs.new_posts }}; do
            echo "Sending email for: $post"
            node scripts/send-post-emails.js "$post"
          done
