backend:
  name: github
  repo: 2Eyeballs/JAF
  branch: main
  base_url: https://sveltia-cms-auth.c-buerhaus.workers.dev

media_folder: "assets/img/photos"
public_folder: "/assets/img/photos"

collections:
  - name: "posts"
    label: "Farm Journal Posts"
    folder: "posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Author", name: "author", widget: "select", options: ["Mule Driver", "Sorta Farmer"], default: "Mule Driver" }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "Short summary shown on the blog listing page" }
      - { label: "Body", name: "body", widget: "markdown" }
